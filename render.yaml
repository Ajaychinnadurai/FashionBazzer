services:
  # ─── Django Backend ─────────────────────────────
  - type: web
    name: fashionbazzer-backend
    runtime: python
    region: singapore
    sourceDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: bash start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: fashionbazzer-backend.onrender.com,fashionbazzer-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://fashionbazzer-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: fashionbazzer-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: fashionbazzer.settings
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_BOARD_ID
        sync: false
      - key: PINTEREST_BOARD_NAME
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: AMAZON_ASSOCIATE_ID
        sync: false
      - key: MEESHO_AFFILIATE_ID
        sync: false
      - key: CUELINKS_ID
        sync: false
      - key: REDIRECT_BASE_URL
        value: https://fashionbazzer-backend.onrender.com/r/
    plan: free

  # ─── Scheduler Worker ───────────────────────────
  - type: worker
    name: fashionbazzer-worker
    runtime: python
    region: singapore
    sourceDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py run_scheduler
    envVars:
      - key: SECRET_KEY
        fromService:
          name: fashionbazzer-backend
          type: web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: false
      - key: DJANGO_SETTINGS_MODULE
        value: fashionbazzer.settings
      - key: DATABASE_URL
        fromDatabase:
          name: fashionbazzer-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_BOARD_ID
        sync: false
      - key: PINTEREST_BOARD_NAME
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: AMAZON_ASSOCIATE_ID
        sync: false
      - key: MEESHO_AFFILIATE_ID
        sync: false
      - key: CUELINKS_ID
        sync: false
      - key: REDIRECT_BASE_URL
        value: https://fashionbazzer-backend.onrender.com/r/
    plan: free

databases:
  - name: fashionbazzer-db
    databaseName: fashionbazzer
    region: singapore
    plan: free
