services:
  # ─── Django Backend ─────────────────────────────
  - type: web
    name: fashionbazzer-backend
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn fashionbazzer.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: fashionbazzer-backend.onrender.com,fashionbazzer-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://fashionbazzer-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: fashionbazzer-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: fashionbazzer.settings
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_BOARD_ID
        sync: false
      - key: PINTEREST_BOARD_NAME
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: AMAZON_ASSOCIATE_ID
        sync: false
      - key: MEESHO_AFFILIATE_ID
        sync: false
      - key: CUELINKS_ID
        sync: false
      - key: REDIRECT_BASE_URL
        value: https://fashionbazzer-backend.onrender.com/r/
    plan: free

  # ─── React Frontend ──────────────────────────────
  - type: static
    name: fashionbazzer-frontend
    runtime: node
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://fashionbazzer-backend.onrender.com/api
      - key: REACT_APP_REDIRECT_BASE
        value: https://fashionbazzer-backend.onrender.com/r
      - key: NODE_VERSION
        value: 20
    plan: free

databases:
  - name: fashionbazzer-db
    databaseName: fashionbazzer
    region: singapore
    plan: free
